
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksatria Digital - Pandawa Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #1c1c1c;
            color: #e5e7eb;
            overflow-x: hidden;
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        /* Custom scrollbar - GoT themed */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1c1c1c; }
        ::-webkit-scrollbar-thumb { background: #450a0a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #7f1d1d; }

        .citadel-bg {
            background-image: radial-gradient(circle at center, rgba(127, 29, 29, 0.1) 0%, transparent 70%);
            background-color: #1c1c1c;
        }

        .gold-gradient {
            background: linear-gradient(to right, #b45309, #fbbf24, #b45309);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .maroon-gradient {
            background: linear-gradient(to right, #450a0a, #991b1b, #450a0a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .iron-border {
            border-image: linear-gradient(to bottom, #450a0a, #b45309, #450a0a) 1;
        }

        /* GoT Themed Additions */
        .wax-seal {
            background: radial-gradient(circle at 30% 30%, #991b1b, #450a0a);
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.6),
                3px 3px 8px rgba(0,0,0,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid #7f1d1d;
        }
        
        .wax-seal::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 50%;
        }

        .dark-parchment {
            background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
            background-color: #1a1816;
            border: 1px solid #3d2b1f;
            position: relative;
        }

        .dark-parchment::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(180, 83, 9, 0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .drop-cap::first-letter {
            font-family: 'Cinzel', serif;
            float: left;
            font-size: 3.5rem;
            line-height: 0.8;
            padding-top: 4px;
            padding-right: 8px;
            color: #b45309;
            font-weight: 900;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }

        .map-pattern {
            background-image: url("https://www.transparenttextures.com/patterns/old-map.png");
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 45;
        }

        .mist {
            position: fixed;
            inset: 0;
            background: url("https://www.transparenttextures.com/patterns/fog.png");
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            animation: mistMove 60s linear infinite;
        }

        @keyframes mistMove {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 500px; }
        }

        .ornate-divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #b45309, #fbbf24, #b45309, transparent);
            position: relative;
            margin: 2rem 0;
        }

        .ornate-divider::after {
            content: '⬥';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #fbbf24;
            background: #1c1c1c;
            padding: 0 10px;
            font-size: 1.2rem;
        }

        .worn-gold {
            background: linear-gradient(to bottom, #fbbf24 0%, #b45309 50%, #78350f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        .fire-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20vh;
            background: linear-gradient(to top, rgba(180, 83, 9, 0.15), transparent);
            pointer-events: none;
            z-index: 2;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }

        @keyframes embers {
            0% { transform: translateY(0) rotate(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg) scale(0.5); opacity: 0; }
        }
        .ember {
            position: absolute;
            background: #b45309;
            border-radius: 50%;
            filter: blur(1px);
            animation: embers var(--duration) linear infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes mouseFlyUp {
          0% { transform: translateY(20px); opacity: 0; }
          20% { opacity: 1; }
          80% { opacity: 1; }
          100% { transform: translateY(-40px); opacity: 0; }
        }
        .animate-mouse-fly { 
          animation: mouseFlyUp 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }
    </style>
<script type="importmap">
{

</head>

</html>
